<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PriceGuard SaaS</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  font-family:Inter;
  background:#f4f7f9;
  margin:0;
}
header{
  background:#2563eb;
  color:white;
  padding:20px;
  text-align:center;
}
.container{
  max-width:1000px;
  margin:30px auto;
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
input,button{
  padding:8px;
  margin:5px;
  border-radius:5px;
  border:1px solid #ccc;
}
button{
  background:#2563eb;
  color:white;
  border:none;
  cursor:pointer;
}
.pro-btn{
  background:#16a34a;
}
table{
  width:100%;
  border-collapse:collapse;
}
th,td{
  padding:8px;
  border-bottom:1px solid #ddd;
}
.alert{
  color:red;
  font-weight:bold;
}
.normal{
  color:green;
  font-weight:bold;
}
</style>
</head>

<body>

<header>
<h1>PriceGuard - Monitor Profesional</h1>
</header>

<div class="container">

<h2>Registro / Login</h2>
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Contraseña">
<button onclick="register()">Registrarse</button>
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>

<!-- 🔥 BOTÓN PRO AÑADIDO -->
<h2>Plan Pro</h2>
<button class="pro-btn" onclick="goPro()">Pasar a Pro - 10€/mes</button>

<h2>Agregar Producto</h2>
<input type="text" id="productName" placeholder="Producto">
<input type="number" id="myPrice" placeholder="Tu Precio">
<input type="number" id="competitorPrice" placeholder="Precio Competidor">
<button onclick="addProduct()">Guardar</button>

<h2>Productos</h2>
<table id="productsTable"></table>

<h2>Historial</h2>
<canvas id="chart"></canvas>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, query, where, onSnapshot, doc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "priceguard-6da48.firebaseapp.com",
  projectId: "priceguard-6da48",
  storageBucket: "priceguard-6da48.appspot.com",
  messagingSenderId: "916598874837",
  appId: "TU_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let selectedProductId = null;

// AUTH
window.register = ()=> createUserWithEmailAndPassword(auth,email.value,password.value);
window.login = ()=> signInWithEmailAndPassword(auth,email.value,password.value);
window.logout = ()=> signOut(auth);

// PRO
window.goPro = async function(){
  if(!currentUser) return alert("Debes iniciar sesión");

  const response = await fetch("/.netlify/functions/create-checkout",{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body: JSON.stringify({
      uid: currentUser.uid,
      email: currentUser.email
    })
  });

  const data = await response.json();
  if(data.url) window.location.href = data.url;
}

// DETECTAR USUARIO
onAuthStateChanged(auth,user=>{
  if(user){
    currentUser = user;
    loadProducts();
  }
});

// AGREGAR PRODUCTO + HISTORIAL
window.addProduct = async function(){
  if(!currentUser) return alert("Login requerido");

  const productRef = await addDoc(collection(db,"products"),{
    user: currentUser.uid,
    name: productName.value,
    myPrice: Number(myPrice.value),
    competitorPrice: Number(competitorPrice.value),
    timestamp: new Date()
  });

  // GUARDAR HISTORIAL
  await addDoc(collection(db,"products",productRef.id,"history"),{
    myPrice: Number(myPrice.value),
    competitorPrice: Number(competitorPrice.value),
    date: new Date()
  });
}

// CARGAR PRODUCTOS
function loadProducts(){

  const q = query(
    collection(db,"products"),
    where("user","==",currentUser.uid)
  );

  onSnapshot(q,snapshot=>{

    let table="<tr><th>Producto</th><th>Mi Precio</th><th>Competidor</th><th>Estado</th></tr>";

    snapshot.forEach(docSnap=>{
      let data=docSnap.data();
      let estado = data.competitorPrice < data.myPrice 
        ? "<span class='alert'>Más barato</span>" 
        : "<span class='normal'>OK</span>";

      table+=`
      <tr onclick="selectProduct('${docSnap.id}','${data.name}')">
        <td>${data.name}</td>
        <td>${data.myPrice}</td>
        <td>${data.competitorPrice}</td>
        <td>${estado}</td>
      </tr>`;
    });

    productsTable.innerHTML=table;
  });
}

// SELECCIONAR PRODUCTO PARA VER HISTORIAL
window.selectProduct = function(productId,name){
  selectedProductId = productId;
  loadHistory(productId,name);
}

// GRÁFICA
const chart = new Chart(document.getElementById("chart"),{
  type:'line',
  data:{
    labels:[],
    datasets:[
      {
        label:'Mi Precio',
        data:[],
        borderColor:'#2563eb'
      },
      {
        label:'Competidor',
        data:[],
        borderColor:'#ef4444'
      }
    ]
  }
});

// CARGAR HISTORIAL REAL
function loadHistory(productId,name){

  const historyRef = collection(db,"products",productId,"history");

  onSnapshot(historyRef,snapshot=>{

    chart.data.labels=[];
    chart.data.datasets[0].data=[];
    chart.data.datasets[1].data=[];

    snapshot.forEach(doc=>{
      const d=doc.data();
      chart.data.labels.push(new Date(d.date.seconds*1000).toLocaleDateString());
      chart.data.datasets[0].data.push(d.myPrice);
      chart.data.datasets[1].data.push(d.competitorPrice);
    });

    chart.options.plugins = {
      title:{
        display:true,
        text:"Historial de "+name
      }
    };

    chart.update();
  });
}

</script>

</body>
</html>
