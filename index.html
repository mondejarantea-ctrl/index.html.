<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PriceGuard PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{margin:0;font-family:Inter;background:#0b0f19;color:white}
nav{position:fixed;width:100%;top:0;padding:20px 60px;display:flex;justify-content:space-between;background:#000}
nav a{color:white;margin:0 10px;text-decoration:none}
section{padding:120px 60px}
.card{background:#111827;padding:30px;border-radius:20px;margin-top:20px}
input, select{width:100%;padding:12px;margin-top:10px;border-radius:10px;background:#0b0f19;color:white;border:1px solid #333}
button{margin-top:10px;padding:12px 20px;border:none;border-radius:10px;background:#22c55e;color:black;font-weight:600;cursor:pointer}
table{width:100%;margin-top:20px;border-collapse:collapse}
td,th{padding:12px;border-bottom:1px solid #333}
.kpi{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
.box{background:#0f172a;padding:20px;border-radius:12px;text-align:center}
</style>
</head>
<body>

<nav>
<b>🚀 PriceGuard</b>
<div>
<a href="#home">Home</a>
<a href="#productos">Productos</a>
<a href="#dashboard">Dashboard</a>
</div>
</nav>

<section id="home">
<h1>Controla tus precios como un profesional</h1>
<div class="card">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Contraseña">
<button onclick="register()">Registrarse</button>
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>
<p id="emailStatus">No conectado</p>
<p>Plan PRO: 15€/mes — 15 días gratis</p>
</div>
</section>

<section id="productos">
<h2>Productos</h2>
<div class="card">
<input id="productName" placeholder="Producto">
<input id="myPrice" type="number" placeholder="Tu precio">
<input id="competitorPrice" type="number" placeholder="Competidor">
<button onclick="addProduct()">Guardar</button>
</div>

<div class="card">
<input type="file" id="csvFile" accept=".csv">
<button onclick="importCSV()">Importar CSV</button>
</div>

<div class="card">
<table id="productsTable">
<thead>
<tr>
<th>Producto</th>
<th>Tu precio</th>
<th>Competidor</th>
<th>Recomendación</th>
<th>Alerta</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>
</section>

<section id="dashboard">
<h2>Dashboard</h2>
<div class="kpi">
<div class="box"><h3 id="kpiTotal">0</h3><p>Total</p></div>
<div class="box"><h3 id="kpiRisk">0</h3><p>Riesgo</p></div>
<div class="box"><h3 id="kpiAvg">0€</h3><p>Precio medio</p></div>
<div class="box"><h3 id="kpiPercent">0%</h3><p>Competitividad</p></div>
</div>
<canvas id="chart"></canvas>
<canvas id="historyChart"></canvas>
</section>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth,createUserWithEmailAndPassword,signInWithEmailAndPassword,signOut,sendEmailVerification,onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore,collection,addDoc,query,where,onSnapshot,setDoc,doc,getDoc }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyA87Bizkb3v2byj6f1Y7qBUGo6nrexYu9Y",
authDomain: "priceguard-13093.firebaseapp.com",
projectId: "priceguard-13093",
storageBucket: "priceguard-13093.firebasestorage.app",
messagingSenderId: "873882635164",
appId: "1:873882635164:web:f64a40e42c6d9ce60d9659",
measurementId: "G-0DCEX9F93Z"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);

let user=null, products=[], isPro=false;

const chart=new Chart(document.getElementById("chart"),{
type:"bar",
data:{labels:["Total","Riesgo","Competitivos"],datasets:[{data:[0,0,0]}]},
options:{plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}
});

const historyChart=new Chart(document.getElementById("historyChart"),{
type:"line",
data:{labels:[],datasets:[{label:"Precio Competidor",data:[],borderColor:"#22c55e",fill:false}]},
options:{plugins:{legend:{display:true}},scales:{y:{beginAtZero:true}}}
});

// ---------- Funciones ----------
window.register=async()=>{
const email=document.getElementById("email").value
const pass=document.getElementById("password").value
const cred=await createUserWithEmailAndPassword(auth,email,pass)
await sendEmailVerification(cred.user)
const trialEnd = Date.now() + (15*24*60*60*1000)
await setDoc(doc(db,"users",cred.user.uid),{pro:false,trial:true,trialEnd:trialEnd})
alert("Cuenta creada. Tienes 15 días de PRO gratis.")
}

window.login=async()=>{
const email=document.getElementById("email").value
const pass=document.getElementById("password").value
await signInWithEmailAndPassword(auth,email,pass)
}

window.logout=()=>signOut(auth);

window.addProduct=async()=>{
if(!user) return
if(!isPro && products.length>=5){alert("Plan gratis: máximo 5 productos"); return;}
const name=document.getElementById("productName").value
const myPrice=parseFloat(document.getElementById("myPrice").value)
const comp=parseFloat(document.getElementById("competitorPrice").value)
const docRef = await addDoc(collection(db,"products"),{uid:user.uid,name,myPrice,comp})
// ⚡ Alertas automáticas
if(myPrice>comp) fetch("https://us-central1-priceguard-13093.cloudfunctions.net/sendAlert",{
method:"POST",headers:{"Content-Type":"application/json"},
body:JSON.stringify({email:user.email,product:name,myPrice,comp})
})
}

window.importCSV=()=>{
const file=document.getElementById("csvFile").files[0];
if(!file) return;
const reader=new FileReader();
reader.onload=e=>{
const lines=e.target.result.split("\n");
lines.forEach(async line=>{
const [name,myPrice,comp]=line.split(",");
if(name && myPrice && comp){
await addDoc(collection(db,"products"),{uid:user.uid,name,myPrice:parseFloat(myPrice),comp:parseFloat(comp)});
}
});
};
reader.readAsText(file);
}

function loadProducts(){
const q=query(collection(db,"products"),where("uid","==",user.uid));
onSnapshot(q,snap=>{
products=[]
document.querySelector("#productsTable tbody").innerHTML=""
snap.forEach(doc=>{
const p=doc.data()
products.push(p)
const tr=document.createElement("tr")
let recommendation="", alertMsg=""
if(p.myPrice>p.comp){recommendation=`Baja a ${p.comp.toFixed(2)}€`; alertMsg="⚠️ No competitivo"}
tr.innerHTML=`<td>${p.name}</td><td>${p.myPrice}€</td><td>${p.comp}€</td><td>${recommendation}</td><td>${alertMsg}</td>`
document.querySelector("#productsTable tbody").appendChild(tr)
})
updateDashboard()
updateHistoryChart()
})
}

function updateDashboard(){
const total=products.length, sum=products.reduce((a,p)=>a+p.myPrice,0)
const risk=products.filter(p=>p.myPrice>p.comp).length
const avg=total?sum/total:0, competitive=total-risk, percent=total?competitive/total*100:0
document.getElementById("kpiTotal").innerText=total
document.getElementById("kpiRisk").innerText=risk
document.getElementById("kpiAvg").innerText=avg.toFixed(2)+"€"
document.getElementById("kpiPercent").innerText=percent.toFixed(0)+"%"
chart.data.datasets[0].data=[total,risk,competitive]; chart.update()
}

function updateHistoryChart(){
historyChart.data.labels=products.map((p,i)=>i+1)
historyChart.data.datasets[0].data=products.map(p=>p.comp)
historyChart.update()
}

onAuthStateChanged(auth,async u=>{
if(!u){document.getElementById("emailStatus").innerText="No conectado"; return;}
user=u
const userRef=doc(db,"users",u.uid)
const snap=await getDoc(userRef)
const data=snap.data()
const now=Date.now()
if(data.pro || (data.trial && now<data.trialEnd)){isPro=true}else{isPro=false; if(data.trial && now>=data.trialEnd) alert("Tu prueba gratis terminó. Plan PRO: 15€/mes")}
document.getElementById("emailStatus").innerText=u.emailVerified?"Email verificado ✅":"Email no verificado ❌"
loadProducts()
})
</script>
</body>
</html>
