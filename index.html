<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
  getAuth, 
  createUserWithEmailAndPassword, 
  signInWithEmailAndPassword, 
  signOut, 
  onAuthStateChanged 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import { 
  getFirestore, 
  collection, 
  addDoc, 
  query, 
  where, 
  onSnapshot,
  doc,
  getDoc,
  setDoc,
  updateDoc,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAWPaWRsbWUgHcoTXa9ZYeSx0nJaXHSj1w",
  authDomain: "priceguard-6da48.firebaseapp.com",
  projectId: "priceguard-6da48",
  storageBucket: "priceguard-6da48.firebasestorage.app",
  messagingSenderId: "916598874837",
  appId: "1:916598874837:web:b7d5016914b35bce84385c",
  measurementId: "G-X3PPGCP1NM"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let isPro = false;
let chartInstance = null;

// ==========================
// REGISTRO
// ==========================
window.register = async function(){

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const userCred = await createUserWithEmailAndPassword(auth,email,password);

  // Crear documento usuario en Firestore
  await setDoc(doc(db,"users",userCred.user.uid),{
    email: email,
    isPro: false,
    createdAt: new Date()
  });

  alert("Usuario creado correctamente");
}

// ==========================
// LOGIN
// ==========================
window.login = function(){
  signInWithEmailAndPassword(
    auth,
    document.getElementById("email").value,
    document.getElementById("password").value
  );
}

// ==========================
// LOGOUT
// ==========================
window.logout = function(){
  signOut(auth);
  location.reload();
}

// ==========================
// PASAR A PRO
// ==========================
window.goPro = async function(){

  if(!currentUser){
    alert("Debes iniciar sesión");
    return;
  }

  const response = await fetch("/.netlify/functions/create-checkout",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      uid: currentUser.uid,
      email: currentUser.email
    })
  });

  const data = await response.json();

  if(data.url){
    window.location.href = data.url;
  } else {
    alert("Error al crear sesión de pago");
  }
}

// ==========================
// DETECTAR USUARIO ACTIVO
// ==========================
onAuthStateChanged(auth, async user=>{

  if(user){
    currentUser = user;

    const userRef = doc(db,"users",user.uid);
const userDoc = await getDoc(userRef);

if(userDoc.exists()){
  isPro = userDoc.data().isPro || false;
}else{
  await setDoc(userRef,{
    email:user.email,
    isPro:false,
    createdAt:new Date()
  });
  isPro = false;
}

    if(isPro){
      document.querySelector(".pro-btn").innerText = "Plan PRO Activo";
      document.querySelector(".pro-btn").disabled = true;
      document.querySelector(".pro-btn").style.background = "#6b7280";
    }

    loadProducts();
    initChart();
  }
});

// ==========================
// AGREGAR PRODUCTO
// ==========================
window.addProduct = async function(){

  if(!currentUser){
    alert("Debes iniciar sesión");
    return;
  }

  // Limite FREE
  const q = query(
    collection(db,"products"),
    where("user","==",currentUser.uid)
  );

  const snapshot = await getDocs(q);

  if(!isPro && snapshot.size >= 3){
    alert("Plan Free limitado a 3 productos. Actualiza a PRO.");
    return;
  }

  await addDoc(collection(db,"products"),{
    user: currentUser.uid,
    name: document.getElementById("productName").value,
    myPrice: Number(document.getElementById("myPrice").value),
    competitorPrice: Number(document.getElementById("competitorPrice").value),
    timestamp: new Date()
  });
}

// ==========================
// CARGAR PRODUCTOS
// ==========================
function loadProducts(){

  const q = query(
    collection(db,"products"),
    where("user","==",currentUser.uid)
  );

  onSnapshot(q, snapshot=>{

    let table="<tr><th>Producto</th><th>Mi Precio</th><th>Competidor</th><th>Estado</th></tr>";

    snapshot.forEach(doc=>{
      let data=doc.data();

      let estado = data.competitorPrice < data.myPrice 
      ? "<span class='alert'>Más barato</span>" 
      : "<span class='normal'>OK</span>";

      table += `
      <tr>
        <td>${data.name}</td>
        <td>${data.myPrice} €</td>
        <td>${data.competitorPrice} €</td>
        <td>${estado}</td>
      </tr>
      `;
    });

    document.getElementById("productsTable").innerHTML=table;
  });
}

// ==========================
// INICIALIZAR GRÁFICA
// ==========================
function initChart(){

  const ctx = document.getElementById('chart');

  const q = query(
    collection(db,"products"),
    where("user","==",currentUser.uid)
  );

  chartInstance = new Chart(ctx,{
    type:'line',
    data:{
      labels:[],
      datasets:[
        {
          label:'Mi Precio',
          data:[],
          borderColor:'#2563eb'
        },
        {
          label:'Competidor',
          data:[],
          borderColor:'#ef4444'
        }
      ]
    }
  });

  onSnapshot(q, snapshot=>{

    chartInstance.data.labels=[];
    chartInstance.data.datasets[0].data=[];
    chartInstance.data.datasets[1].data=[];

    snapshot.forEach(doc=>{
      let d=doc.data();
      chartInstance.data.labels.push(d.name);
      chartInstance.data.datasets[0].data.push(d.myPrice);
      chartInstance.data.datasets[1].data.push(d.competitorPrice);
    });

    chartInstance.update();
  });
}

</script>
